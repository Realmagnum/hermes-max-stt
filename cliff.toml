# git-cliff configuration for hermes-max-integration (EN)
[changelog]
header = "# Changelog\n\nAll notable changes to the hermes-max-integration plugin.\n"
body = """
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.breaking %} **BREAKING**{% endif %}
{% endfor %}
{% endfor %}
"""
footer = "<!-- generated by git-cliff -->"
# Clean up the auto-generated group names: "<!-- 0 -->🚀 Features" → "🚀 Features"
postprocessors = [
  { pattern = '<!-- \d+ -->', replace = "" },
]
trim = true

[git]
conventional_commits = true
filter_unconventional = false
trailers = false
