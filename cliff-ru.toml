# git-cliff configuration for hermes-max-integration (RU)
[changelog]
header = "# Список изменений\n\nВсе заметные изменения в плагине hermes-max-integration.\n"
body = """
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
{{ group }}

{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.breaking %} **BREAKING**{% endif %}
{% endfor %}
{% endfor %}
"""
footer = "<!-- generated by git-cliff -->"
# Clean group names AND translate to Russian (full line replacement)
postprocessors = [
  { pattern = '<!-- \d+ -->🚀 Features', replace = "### Добавлено" },
  { pattern = '<!-- \d+ -->🐛 Bug Fixes', replace = "### Исправлено" },
  { pattern = '<!-- \d+ -->📚 Documentation', replace = "### Документация" },
  { pattern = '<!-- \d+ -->♻️ Refactoring', replace = "### Рефакторинг" },
  { pattern = '<!-- \d+ -->⚡ Performance', replace = "### Производительность" },
  { pattern = '<!-- \d+ -->✅ Tests', replace = "### Тесты" },
  { pattern = '<!-- \d+ -->🔧 Chores', replace = "### Служебное" },
]
trim = true

[git]
conventional_commits = true
filter_unconventional = false
trailers = false
